
server.port=8083
spring.application.name=COMPARISON-SERVICE

# 2. Eureka Configuration (Connect to the Phonebook)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=jdbc:postgresql://localhost:5432/comparison_db
spring.datasource.username=postgres
spring.datasource.password=4565
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true


spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cache TTL
app.cache.price.ttl-minutes=30